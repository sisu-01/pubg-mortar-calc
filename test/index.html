<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE4 16-bit PNG Heightmap Viewer in Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: sans-serif;
        }
        #header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(5px);
            color: white;
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #header label {
            font-weight: bold;
            margin-right: 10px;
            font-size: 14px;
        }
        #map-select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        #map-select:hover { background: #444; }
        #info-panel {
            position: absolute;
            top: 70px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.6;
            z-index: 5;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 5;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="header">
        <label for="map-select">MAP SELECT :</label>
        <select id="map-select">
            <option value="erangel">Erangel</option>
            <option value="miramar">Miramar</option>
            <option value="vikendi">Vikendi</option>
            <option value="sanhok">Sanhok</option>
            <option value="karakin">Karakin</option>
            <option value="jackal" selected>Jackal</option>
        </select>
    </div>

    <div id="loading" style="display: none;">16비트 하이트맵 디코딩 중...</div>
    
    <div id="info-panel">
        <h3 style="margin-top:0; border-bottom:1px solid #555; padding-bottom:5px;" id="current-map-title">지형 정보</h3>
        <p>클릭한 위치 (World)</p>
        X: <span id="pos-x">0</span> m<br>
        Y: <span id="pos-y">0</span> m<br>
        Z (Height): <span id="pos-z">0</span> m
    </div>

    <script>
        const MAP_PIXELS = 8192;              
        const SEGMENTS = 512; // 레이캐스팅 및 렌더링 밸런스를 위해 512로 안정화

        const MAP_SCALES = {
            'erangel': 0.9765625,
            'miramar': 0.9765625,
            'vikendi': 1.3020833333333333,
            'sanhok':  0.9765625,
            'karakin': 0.9765625,
            'jackal':  0.48828125
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0b0d0);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
        camera.position.set(0, 4000, 6000); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.maxPolarAngle = Math.PI / 2 - 0.01; 
        controls.maxDistance = 1500000; 

        // --- 밝은 조명 세팅 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(2000, 8000, 4000);
        scene.add(dirLight);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let terrainMesh = null;
        let seaMesh = null;
        let currentRawData = null; 
        
        const textureLoader = new THREE.TextureLoader();

        // --- 💡 밝기 및 가시성 보정 셰이더 ---
        const terrainShaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                heightmap: { value: null },
                zScale: { value: 0.96 },
                zReference: { value: 32639.0 }
            },
            vertexShader: `
                uniform sampler2D heightmap;
                uniform float zScale;
                uniform float zReference;
                varying vec3 vPosition;
                varying vec2 vUv;

                void main() {
                    vUv = uv;
                    vec4 tex = texture2D(heightmap, uv);
                    
                    // R, G 채널 결합 및 복원
                    float raw_pixel = (tex.r * 255.0 * 256.0) + (tex.g * 255.0);
                    if(tex.g == 0.0 && tex.r > 0.0) { raw_pixel = tex.r * 65535.0; } 

                    // 정밀 고도 공식 적용
                    float actual_height = ((raw_pixel - zReference) / 65535.0) * 512.0 * zScale;

                    vec3 transformed = vec3(position.x, position.y, actual_height);
                    vPosition = transformed;
                    
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vPosition;
                varying vec2 vUv;
                void main() {
                    // 💡 지형 굴곡이 눈에 잘 띄도록 수직 높이 기반의 컬러 램프 및 간이 음영 적용
                    float heightFactor = (vPosition.z + 500.0) / 1500.0; // 높이별 음영 가중치
                    
                    // 기본 지형 색상 (기존보다 밝은 초록-회색 계열 톤 적용)
                    vec3 baseColor = mix(vec3(0.3, 0.45, 0.25), vec3(0.5, 0.55, 0.45), clamp(heightFactor, 0.0, 1.0));
                    
                    // 가짜 월드 스페이스 라이팅 (빛이 위에서 밝게 내리쬐는 효과)
                    vec3 fakeLightDir = normalize(vec3(0.3, 0.3, 1.0));
                    
                    // 픽셀 편차를 이용해 미세 굴곡 섀이딩 표현
                    vec3 dx = dFdx(vPosition);
                    vec3 dy = dFdy(vPosition);
                    vec3 certNormal = normalize(cross(dx, dy));
                    
                    float light = max(dot(certNormal, fakeLightDir), 0.0) * 0.6 + 0.4;
                    
                    gl_FragColor = vec4(baseColor * light, 1.0);
                }
            `,
            extensions: { derivatives: true } // 미세 굴곡 연산용 익스텐션 활성화
        });

        function loadTerrain(mapName) {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('current-map-title').innerText = mapName.toUpperCase() + ' 지형 정보';

            if (terrainMesh) { scene.remove(terrainMesh); terrainMesh.geometry.dispose(); }
            if (seaMesh) { scene.remove(seaMesh); seaMesh.geometry.dispose(); seaMesh.material.dispose(); }

            const currentScaleXY = MAP_SCALES[mapName] || 0.9765625;
            const worldSize = MAP_PIXELS * currentScaleXY; 
            
            const heightmapUrl = `../image/heightmap/${mapName}_heightmap.png`;

            const img = new Image();
            img.src = heightmapUrl;
            img.onload = function() {
                
                const canvas = document.createElement('canvas');
                canvas.width = SEGMENTS + 1;
                canvas.height = SEGMENTS + 1;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, MAP_PIXELS, MAP_PIXELS, 0, 0, SEGMENTS + 1, SEGMENTS + 1);
                currentRawData = ctx.getImageData(0, 0, SEGMENTS + 1, SEGMENTS + 1).data;

                textureLoader.load(heightmapUrl, function(texture) {
                    document.getElementById('loading').style.display = 'none';

                    // 텍스처 필터 변경으로 계단현상 최소화 및 밝기 선명도 확보
                    texture.minFilter = THREE.LinearFilter;
                    texture.magFilter = THREE.LinearFilter;
                    texture.needsUpdate = true;
                    
                    terrainShaderMaterial.uniforms.heightmap.value = texture;

                    const geometry = new THREE.PlaneGeometry(worldSize, worldSize, SEGMENTS, SEGMENTS);
                    
                    terrainMesh = new THREE.Mesh(geometry, terrainShaderMaterial);
                    terrainMesh.rotation.x = -Math.PI / 2; 
                    scene.add(terrainMesh);

                    // 바다 생성 (투명한 블루)
                    const seaGeometry = new THREE.PlaneGeometry(worldSize, worldSize);
                    const seaMaterial = new THREE.MeshStandardMaterial({
                        color: 0x224477, transparent: true, opacity: 0.5, roughness: 0.1
                    });
                    seaMesh = new THREE.Mesh(seaGeometry, seaMaterial);
                    seaMesh.rotation.x = -Math.PI / 2;
                    seaMesh.position.y = -2.0;
                    scene.add(seaMesh);

                    controls.target.set(0, 0, 0);
                    camera.position.set(0, worldSize * 0.6, worldSize * 0.9);
                    controls.update();
                });
            };

            img.onerror = function() {
                document.getElementById('loading').style.display = 'none';
                alert(`${heightmapUrl} 파일을 찾을 수 없습니다.`);
            };
        }

        const mapSelect = document.getElementById('map-select');
        mapSelect.addEventListener('change', (e) => loadTerrain(e.target.value));
        loadTerrain(mapSelect.value);

        window.addEventListener('click', onMouseClick, false);

        function onMouseClick(event) {
            if (event.clientY < 60) return; 
            if (!terrainMesh || !currentRawData) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(seaMesh);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                const currentScaleXY = MAP_SCALES[mapSelect.value] || 0.9765625;
                const worldSize = MAP_PIXELS * currentScaleXY;

                let u = (point.x + worldSize / 2) / worldSize;
                let v = (point.z + worldSize / 2) / worldSize;
                
                u = Math.max(0, Math.min(1, u));
                v = Math.max(0, Math.min(1, v));

                const imgX = Math.floor(u * SEGMENTS);
                const imgY = Math.floor(v * SEGMENTS);
                const dataIndex = (imgY * (SEGMENTS + 1) + imgX) * 4;

                let r = currentRawData[dataIndex];
                let g = currentRawData[dataIndex + 1];
                let raw_pixel = (r * 256.0) + g;
                
                if(g === 0 && r > 0) { raw_pixel = r * 257.0; } 

                const Z_SCALE = 0.96;
                const Z_REFERENCE_PIXEL = 32639.0;
                const actual_height = ((raw_pixel - Z_REFERENCE_PIXEL) / 65535.0) * 512.0 * Z_SCALE;

                document.getElementById('pos-x').innerText = point.x.toFixed(2);
                document.getElementById('pos-y').innerText = point.z.toFixed(2); 
                document.getElementById('pos-z').innerText = actual_height.toFixed(2);
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
